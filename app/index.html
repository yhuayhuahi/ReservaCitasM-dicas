<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>App - Gestion de citas médicas</title>
    <style>
      /* 1. Eliminar márgenes y paddings de todo por defecto */
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box; 
      }

      /* 2. Asegurar que la app ocupe toda la pantalla */
      html, body {
        width: 100%;
        height: 100%;
        /* Evita el scroll elástico en iOS/Android (efecto rebote) */
        overscroll-behavior: none; 
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      }

      /* 3. Quitar el resaltado azul al tocar botones en Android/Chrome */
      * {
        -webkit-tap-highlight-color: transparent;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
